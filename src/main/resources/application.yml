spring:
  application:
    name: ai-code-backend
  profiles:
    active: local
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code
    username: root
    password: 12345678
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
      password:
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations:
  - classpath:mapper/*.xml
server:
  port: 8123
  servlet:
    session:
      timeout: 30m
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.dsj.aicode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
